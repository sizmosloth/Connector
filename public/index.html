<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="violet">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     SCREEN 1 — JOIN
═══════════════════════════════════════════ -->
<div id="joinScreen" class="screen active">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow g1" aria-hidden="true"></div>
  <div class="bg-glow g2" aria-hidden="true"></div>
  <div class="bg-glow g3" aria-hidden="true"></div>

  <!-- Scrollable wrapper so form never clips on small screens -->
  <div class="join-scroll-wrap">
    <div class="join-card">

      <!-- Logo -->
      <div class="join-logo">
        <div class="logo-mark">
          <svg viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="18" r="17" stroke="currentColor" stroke-width="2"/>
            <path d="M10 18 C10 13 14 10 18 10 C22 10 26 13 26 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            <circle cx="12" cy="22" r="2.5" fill="currentColor"/>
            <circle cx="18" cy="24" r="2.5" fill="currentColor"/>
            <circle cx="24" cy="22" r="2.5" fill="currentColor"/>
          </svg>
        </div>
        <span class="logo-name">Connector</span>
      </div>

      <h1 class="join-headline">Talk to anyone,<br/><em>anywhere.</em></h1>
      <p class="join-sub">Fill in your details to join the room instantly.</p>

      <form class="join-form" onsubmit="return false">

        <div class="form-row two-col">
          <div class="field">
            <label for="jUsername">Username <span class="req">*</span></label>
            <input id="jUsername" type="text" placeholder="e.g. Rahul_07" maxlength="24" autocomplete="off" spellcheck="false" />
          </div>
          <div class="field">
            <label for="jAge">Age</label>
            <input id="jAge" type="number" placeholder="22" min="13" max="99" />
          </div>
        </div>

        <div class="form-row two-col">
          <div class="field">
            <label for="jGender">Gender</label>
            <select id="jGender">
              <option value="">Prefer not to say</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Non-binary">Non-binary</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="field">
            <label for="jLocation">Location</label>
            <input id="jLocation" type="text" placeholder="e.g. Punjab, India" maxlength="40" />
          </div>
        </div>

        <div class="field">
          <label for="jAbout">About Me</label>
          <textarea id="jAbout" placeholder="Tell people a little about yourself…" rows="2" maxlength="160"></textarea>
        </div>

        <div class="field">
          <label>Pick an Avatar</label>
          <div class="avatar-picker" id="joinAvatarPicker">
            <button type="button" class="av-opt selected" data-av="😎">😎</button>
            <button type="button" class="av-opt" data-av="🧑‍💻">🧑‍💻</button>
            <button type="button" class="av-opt" data-av="🦸">🦸</button>
            <button type="button" class="av-opt" data-av="🧑‍🎨">🧑‍🎨</button>
            <button type="button" class="av-opt" data-av="🧑‍🚀">🧑‍🚀</button>
            <button type="button" class="av-opt" data-av="🐱">🐱</button>
            <button type="button" class="av-opt" data-av="🦊">🦊</button>
            <button type="button" class="av-opt" data-av="🐼">🐼</button>
          </div>
        </div>

        <div class="field">
          <label>Appearance</label>
          <div class="join-appearance">
            <div class="theme-chips">
              <button type="button" class="theme-chip active" data-theme="dark"  onclick="setTheme('dark')">🌙 Dark</button>
              <button type="button" class="theme-chip"        data-theme="light" onclick="setTheme('light')">☀️ Light</button>
            </div>
            <div class="accent-row">
              <button type="button" class="ac-dot ac-violet active" data-ac="violet"  onclick="setAccent('violet')"  title="Violet"></button>
              <button type="button" class="ac-dot ac-blue"          data-ac="blue"    onclick="setAccent('blue')"    title="Blue"></button>
              <button type="button" class="ac-dot ac-emerald"       data-ac="emerald" onclick="setAccent('emerald')" title="Emerald"></button>
              <button type="button" class="ac-dot ac-rose"          data-ac="rose"    onclick="setAccent('rose')"    title="Rose"></button>
              <button type="button" class="ac-dot ac-amber"         data-ac="amber"   onclick="setAccent('amber')"   title="Amber"></button>
            </div>
          </div>
        </div>

        <p class="form-error" id="joinError"></p>

        <button type="button" class="btn-primary btn-join" onclick="joinChat()">
          <span>Join Room</span>
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        </button>

      </form>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════════════
     SCREEN 2 — APP
═══════════════════════════════════════════ -->
<div id="appScreen" class="screen">
  <div class="bg-glow g1" aria-hidden="true"></div>
  <div class="bg-glow g2" aria-hidden="true"></div>

  <div class="app-layout">

    <!-- ══ SIDEBAR ══ -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar-logo">
        <div class="logo-mark sm">
          <svg viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="18" r="17" stroke="currentColor" stroke-width="2"/>
            <path d="M10 18 C10 13 14 10 18 10 C22 10 26 13 26 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            <circle cx="12" cy="22" r="2.5" fill="currentColor"/>
            <circle cx="18" cy="24" r="2.5" fill="currentColor"/>
            <circle cx="24" cy="22" r="2.5" fill="currentColor"/>
          </svg>
        </div>
        <span class="logo-name">Connector</span>
      </div>

      <!-- My profile -->
      <div class="my-profile-card" id="myProfileCard" onclick="openProfileEditor()" title="Edit your profile">
        <div class="mpc-avatar" id="sidebarAvatar">😎</div>
        <div class="mpc-info">
          <p class="mpc-name" id="sidebarName">—</p>
          <p class="mpc-meta" id="sidebarMeta">Edit profile →</p>
        </div>
        <span class="online-badge" title="Online"></span>
      </div>

      <!-- Online users -->
      <div class="sidebar-section">
        <div class="section-header">
          <span class="section-title">Online Now</span>
          <span class="pill-count" id="onlineCount">0</span>
        </div>
        <div class="user-list" id="userList"></div>
      </div>

      <div class="sidebar-spacer"></div>

      <!-- Settings -->
      <div class="sidebar-settings">
        <p class="section-title mb10">Appearance</p>

        <div class="setting-row">
          <span class="setting-label">Mode</span>
          <div class="seg-ctrl">
            <button class="seg-btn" id="btnDark"  onclick="setTheme('dark')">🌙</button>
            <button class="seg-btn" id="btnLight" onclick="setTheme('light')">☀️</button>
          </div>
        </div>

        <div class="setting-row">
          <span class="setting-label">Accent</span>
          <div class="accent-row">
            <button class="ac-dot ac-violet"  data-ac="violet"  onclick="setAccent('violet')"  title="Violet"></button>
            <button class="ac-dot ac-blue"    data-ac="blue"    onclick="setAccent('blue')"    title="Blue"></button>
            <button class="ac-dot ac-emerald" data-ac="emerald" onclick="setAccent('emerald')" title="Emerald"></button>
            <button class="ac-dot ac-rose"    data-ac="rose"    onclick="setAccent('rose')"    title="Rose"></button>
            <button class="ac-dot ac-amber"   data-ac="amber"   onclick="setAccent('amber')"   title="Amber"></button>
          </div>
        </div>

        <div class="setting-row">
          <span class="setting-label">Sound</span>
          <label class="toggle">
            <input type="checkbox" id="soundToggle" onchange="savePrefs()" />
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>

      <button class="leave-btn" onclick="leaveRoom()">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 100-2H4V5h7a1 1 0 100-2H3zm11.293 4.293a1 1 0 011.414 1.414L13.414 11H10a1 1 0 110-2h3.414l2.293-2.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
        Leave Room
      </button>
    </aside>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- ══ CHAT MAIN ══ -->
    <main class="chat-main">

      <header class="chat-topbar">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-center">
          <span class="topbar-room">Public Room</span>
          <span class="topbar-online" id="topbarSub">0 online</span>
        </div>
        <button class="topbar-av-btn" onclick="openProfileEditor()" title="Edit profile" aria-label="Edit profile">
          <span id="topbarAvatar">😎</span>
        </button>
      </header>

      <div class="messages-wrap" id="messagesWrap">
        <div class="messages" id="messages">
          <div class="chat-welcome">
            <div class="welcome-emoji">💬</div>
            <p class="welcome-text">Welcome to the public room.<br/>Say hello to everyone!</p>
          </div>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="typing-bar" id="typingBar" aria-live="polite"></div>

      <!-- Input footer -->
      <footer class="input-footer">
        <button class="icon-btn emoji-btn" id="emojiBtn" onclick="toggleEmojiPicker()" title="Emoji" aria-label="Pick emoji">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
        </button>

        <!-- Emoji picker popup -->
        <div class="emoji-picker hidden" id="emojiPicker">
          <div class="emoji-grid" id="emojiGrid"></div>
        </div>

        <div class="input-pill">
          <textarea
            id="msgInput"
            placeholder="Write a message…"
            rows="1"
            maxlength="2000"
            onkeydown="handleMsgKey(event)"
            oninput="handleTypingInput()"
            aria-label="Message"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </footer>

    </main>
  </div>
</div>


<!-- ═══════════════════════════════════════════
     PROFILE EDITOR MODAL
═══════════════════════════════════════════ -->
<div class="modal-overlay hidden" id="profileModal" onclick="closeProfileEditor(event)">
  <div class="modal-card profile-editor" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">Edit Profile</h2>
      <button class="modal-close" onclick="closeProfileEditor(null)" aria-label="Close">✕</button>
    </div>

    <div class="pe-avatar-section">
      <div class="pe-big-avatar" id="peAvatar">😎</div>
      <div class="avatar-picker" id="peAvatarPicker">
        <button type="button" class="av-opt" data-av="😎">😎</button>
        <button type="button" class="av-opt" data-av="🧑‍💻">🧑‍💻</button>
        <button type="button" class="av-opt" data-av="🦸">🦸</button>
        <button type="button" class="av-opt" data-av="🧑‍🎨">🧑‍🎨</button>
        <button type="button" class="av-opt" data-av="🧑‍🚀">🧑‍🚀</button>
        <button type="button" class="av-opt" data-av="🐱">🐱</button>
        <button type="button" class="av-opt" data-av="🦊">🦊</button>
        <button type="button" class="av-opt" data-av="🐼">🐼</button>
      </div>
    </div>

    <div class="form-row two-col">
      <div class="field">
        <label for="peUsername">Username</label>
        <input id="peUsername" type="text" maxlength="24" />
      </div>
      <div class="field">
        <label for="peAge">Age</label>
        <input id="peAge" type="number" min="13" max="99" />
      </div>
    </div>
    <div class="form-row two-col">
      <div class="field">
        <label for="peGender">Gender</label>
        <select id="peGender">
          <option value="">Prefer not to say</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Non-binary">Non-binary</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label for="peLocation">Location</label>
        <input id="peLocation" type="text" maxlength="40" />
      </div>
    </div>
    <div class="field">
      <label for="peAbout">About Me</label>
      <textarea id="peAbout" rows="3" maxlength="160"></textarea>
    </div>

    <div class="field">
      <p class="field-label-sm">Your ID</p>
      <div class="id-display-row">
        <code id="peUserId" class="id-code">—</code>
        <button class="copy-id-btn" onclick="copyUserId()" title="Copy ID">Copy</button>
      </div>
    </div>

    <button class="btn-primary" onclick="saveProfileEdit()">Save Changes</button>
  </div>
</div>


<!-- ═══════════════════════════════════════════
     USER PROFILE CARD POPUP
═══════════════════════════════════════════ -->
<div class="modal-overlay hidden" id="userCardModal" onclick="closeUserCard(event)">
  <div class="modal-card user-card" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeUserCard(null)" aria-label="Close">✕</button>
    <div class="uc-avatar" id="ucAvatar">😎</div>
    <h3 class="uc-name"  id="ucName">—</h3>
    <p  class="uc-id"    id="ucId">—</p>
    <div class="uc-tags"  id="ucTags"></div>
    <p  class="uc-about" id="ucAbout"></p>
  </div>
</div>


<!-- Toast notification -->
<div class="toast hidden" id="toast"></div>

<!-- Connection banner -->
<div class="conn-banner hidden" id="connBanner">⚡ Reconnecting…</div>

<script src="script.js"></script>
</body>
</html>
