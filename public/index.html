<!DOCTYPE html>
<html lang="en" data-theme="light" data-accent="sage">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sora Chat 🌿</title>

  <!--
    Font strategy:
    • Fraunces  — quirky old-style serif for the logo / display moments
    • Outfit    — clean geometric sans for UI text
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══════════════════════════════════════════════
     LANDING / JOIN SCREEN
══════════════════════════════════════════════ -->
<div id="landingScreen" class="screen active">

  <!-- Animated mesh background -->
  <div class="mesh" aria-hidden="true">
    <div class="mesh-orb orb-1"></div>
    <div class="mesh-orb orb-2"></div>
    <div class="mesh-orb orb-3"></div>
  </div>

  <!-- Grain overlay for texture depth -->
  <div class="grain" aria-hidden="true"></div>

  <div class="landing-card">
    <div class="landing-logo">
      <span class="logo-leaf">🌿</span>
      <h1 class="logo-text">Sora</h1>
    </div>
    <p class="landing-sub">A calm place to chat.</p>

    <div class="join-form">
      <label class="field-label" for="joinUsername">Your name</label>
      <div class="join-input-row">
        <input
          id="joinUsername"
          type="text"
          placeholder="Enter your name…"
          maxlength="24"
          autocomplete="off"
          spellcheck="false"
          onkeydown="if(event.key==='Enter') joinChat()"
        />
        <button class="btn-join" onclick="joinChat()">
          <span>Enter</span>
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
      <p class="join-error" id="joinError"></p>
    </div>

    <!-- Theme & accent pickers shown on landing too -->
    <div class="landing-prefs">
      <button class="pref-btn" onclick="toggleTheme()" id="landingThemeBtn" title="Toggle theme">☽</button>
      <div class="accent-dots" title="Pick accent color">
        <button class="dot dot-sage   active" onclick="setAccent('sage')"   aria-label="Sage"></button>
        <button class="dot dot-rose"         onclick="setAccent('rose')"   aria-label="Rose"></button>
        <button class="dot dot-sky"          onclick="setAccent('sky')"    aria-label="Sky"></button>
        <button class="dot dot-amber"        onclick="setAccent('amber')"  aria-label="Amber"></button>
      </div>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════════
     MAIN CHAT APP
══════════════════════════════════════════════ -->
<div id="appScreen" class="screen">

  <div class="mesh" aria-hidden="true">
    <div class="mesh-orb orb-1"></div>
    <div class="mesh-orb orb-2"></div>
    <div class="mesh-orb orb-3"></div>
  </div>
  <div class="grain" aria-hidden="true"></div>

  <!-- ── App Shell ──────────────────────────── -->
  <div class="app-shell">

    <!-- ── Sidebar ──────────────────────────── -->
    <aside class="sidebar" id="sidebar">

      <!-- Logo -->
      <div class="sidebar-logo">
        <span class="logo-leaf-sm">🌿</span>
        <span class="sidebar-brand">Sora</span>
      </div>

      <!-- Profile card -->
      <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div class="profile-info">
          <!-- Username (click to edit) -->
          <div class="username-display" id="usernameDisplay" onclick="startEditUsername()" title="Click to edit">
            <span id="usernameText">—</span>
            <svg class="edit-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M12.854.146a.5.5 0 00-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 000-.708L12.854.146zM11.207 2.5 3.354 10.354l-.707 3.535 3.535-.707L14.5 5.207 11.207 2.5z"/>
            </svg>
          </div>
          <!-- Edit field (hidden by default) -->
          <div class="username-edit hidden" id="usernameEdit">
            <input id="usernameInput" type="text" maxlength="24" spellcheck="false" onkeydown="handleUsernameKey(event)"/>
            <button class="save-btn" onclick="saveUsername()">Save</button>
          </div>
          <p class="user-id-label">ID: <code id="userIdText">—</code></p>
        </div>
      </div>

      <!-- Active users -->
      <div class="sidebar-section">
        <p class="sidebar-section-title">
          Online
          <span class="online-count" id="onlineCount">0</span>
        </p>
        <div id="activeUserList" class="active-user-list"></div>
      </div>

      <!-- Settings -->
      <div class="sidebar-settings">
        <p class="sidebar-section-title">Appearance</p>

        <div class="setting-row">
          <span>Mode</span>
          <button class="mode-toggle" id="themeBtn" onclick="toggleTheme()">☽ Dark</button>
        </div>

        <div class="setting-row">
          <span>Accent</span>
          <div class="accent-dots">
            <button class="dot dot-sage"   onclick="setAccent('sage')"   aria-label="Sage"   title="Sage"></button>
            <button class="dot dot-rose"   onclick="setAccent('rose')"   aria-label="Rose"   title="Rose"></button>
            <button class="dot dot-sky"    onclick="setAccent('sky')"    aria-label="Sky"    title="Sky"></button>
            <button class="dot dot-amber"  onclick="setAccent('amber')"  aria-label="Amber"  title="Amber"></button>
          </div>
        </div>

        <div class="setting-row">
          <span>Sound</span>
          <label class="toggle-switch">
            <input type="checkbox" id="soundToggle" onchange="savePref()"/>
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>

      <!-- Leave -->
      <button class="leave-btn" onclick="leaveChat()">Leave room</button>
    </aside>

    <!-- ── Chat Area ─────────────────────────── -->
    <main class="chat-area">

      <!-- Top bar (mobile / compact) -->
      <header class="chat-topbar">
        <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-title">
          <span class="logo-leaf-sm">🌿</span> Sora Chat
        </div>
        <div class="topbar-right">
          <span class="online-pill"><span class="online-dot"></span><span id="topbarCount">0</span></span>
        </div>
      </header>

      <!-- Messages -->
      <div class="messages-wrap" id="messagesWrap">
        <div class="messages" id="messages">
          <!-- Messages injected here by JS -->
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="typing-bar" id="typingBar" aria-live="polite"></div>

      <!-- Input bar -->
      <footer class="input-bar">
        <div class="input-pill">
          <textarea
            id="msgInput"
            placeholder="Write something…"
            rows="1"
            maxlength="2000"
            onkeydown="handleMsgKey(event)"
            oninput="handleTypingInput()"
            aria-label="Message"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <p class="char-count" id="charCount"></p>
      </footer>

    </main>
  </div>
</div>

<!-- Connection status toast -->
<div class="conn-toast" id="connToast">Reconnecting…</div>

<script src="script.js"></script>
</body>
</html>
